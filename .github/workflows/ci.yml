name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Build and Test (Linux/macOS)
        if: runner.os != 'Windows'
        run: bash scripts/run-tests.sh

      - name: Build and Test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DLUNDI_BUILD_TESTS=ON
          cmake --build . --config Release -j
          ./tests/Release/lundi_tests.exe
